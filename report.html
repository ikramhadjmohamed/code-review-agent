<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Code Review Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
      color: #58a6ff;
    }

    .subtitle {
      text-align: center;
      color: #8b949e;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    textarea {
      width: 100%;
      height: 300px;
      background: #161b22;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      resize: vertical;
      outline: none;
    }

    textarea:focus { border-color: #58a6ff; }

    .input-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      background: #161b22;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.9rem;
      outline: none;
    }

    input[type="text"]:focus { border-color: #58a6ff; }

    button {
      background: #238636;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    button:hover { background: #2ea043; }
    button:disabled { background: #444; cursor: not-allowed; }

    .or {
      text-align: center;
      color: #8b949e;
      margin: 20px 0 8px;
      font-size: 0.85rem;
    }

    .pr-row {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
    }

    #report { margin-top: 40px; }

    .summary-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .quality {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .quality.poor      { color: #f85149; }
    .quality.fair      { color: #d29922; }
    .quality.good      { color: #3fb950; }
    .quality.excellent { color: #3fb950; }

    .counts {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .count-badge {
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .badge-critical { background: #3d1a1a; color: #f85149; }
    .badge-high     { background: #2d1f0e; color: #e3b341; }
    .badge-medium   { background: #2d2208; color: #d29922; }
    .badge-low      { background: #0e2030; color: #58a6ff; }

    .concerns { color: #8b949e; font-size: 0.9rem; }
    .concerns span { color: #e6edf3; }

    .issue-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 14px;
      border-left: 4px solid #30363d;
    }

    .issue-card.critical { border-left-color: #f85149; }
    .issue-card.high     { border-left-color: #e3b341; }
    .issue-card.medium   { border-left-color: #d29922; }
    .issue-card.low      { border-left-color: #58a6ff; }

    .issue-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .issue-title { font-weight: 700; font-size: 1rem; }

    .issue-meta {
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 10px;
    }

    .issue-explanation { font-size: 0.9rem; margin-bottom: 10px; line-height: 1.5; }

    .issue-fix {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: #3fb950;
      font-family: 'Courier New', monospace;
    }

    .loading {
      text-align: center;
      color: #58a6ff;
      font-size: 1rem;
      padding: 40px;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: #3d1a1a;
      color: #f85149;
      border: 1px solid #f85149;
      border-radius: 8px;
      padding: 16px;
      margin-top: 20px;
      display: none;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Code Review Agent</h1>
    <p class="subtitle">AI-powered code review using tool-calling agent + static analysis</p>

    <!-- Code input -->
    <textarea id="codeInput" placeholder="Paste your Python code here..."></textarea>
    <div class="input-row">
      <input type="text" id="filename" placeholder="filename.py (optional)" value="snippet.py" />
      <button onclick="reviewCode()" id="reviewBtn">Review Code</button>
    </div>

    <!-- OR GitHub PR -->
    <p class="or">— or review a GitHub Pull Request —</p>
    <div class="pr-row">
      <input type="text" id="prUrl" placeholder="https://github.com/owner/repo/pull/123" />
      <button onclick="reviewPR()" id="prBtn">Review PR</button>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <span class="spinner"></span> Agent is running tools and analyzing your code...
    </div>

    <!-- Error -->
    <div class="error" id="error"></div>

    <!-- Report -->
    <div id="report"></div>
  </div>

  <script>
    const API = "http://127.0.0.1:8001";

    const ICONS = {
      critical: "🔴", high: "🟠", medium: "🟡", low: "🔵"
    };

    function showLoading(show) {
      document.getElementById("loading").style.display = show ? "block" : "none";
      document.getElementById("reviewBtn").disabled = show;
      document.getElementById("prBtn").disabled = show;
    }

    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = "Error: " + msg;
      el.style.display = "block";
    }

    function clearUI() {
      document.getElementById("report").innerHTML = "";
      document.getElementById("error").style.display = "none";
    }

    function renderReport(data) {
      const issues  = data.issues || [];
      const summary = data.summary || {};
      const quality = summary.overall_quality || "unknown";
      const concerns = summary.top_concerns || [];

      const order = { critical: 0, high: 1, medium: 2, low: 3 };
      issues.sort((a, b) => (order[a.severity] ?? 4) - (order[b.severity] ?? 4));

      let html = `
        <div class="summary-box">
          <div class="quality ${quality}">
            Overall Quality: ${quality.toUpperCase()}
          </div>
          <div class="counts">
            <span class="count-badge badge-critical">🔴 Critical: ${summary.critical || 0}</span>
            <span class="count-badge badge-high">🟠 High: ${summary.high || 0}</span>
            <span class="count-badge badge-medium">🟡 Medium: ${summary.medium || 0}</span>
            <span class="count-badge badge-low">🔵 Low: ${summary.low || 0}</span>
          </div>
          ${concerns.length ? `
          <div class="concerns">
            Top concerns: ${concerns.map(c => `<span>${c}</span>`).join(", ")}
          </div>` : ""}
        </div>

        <div class="section-title">${issues.length} Issues Found</div>
      `;

      issues.forEach(issue => {
        const sev  = issue.severity || "low";
        const line = issue.line ? `Line ${issue.line}` : "General";
        html += `
          <div class="issue-card ${sev}">
            <div class="issue-header">
              <span>${ICONS[sev] || "⚪"}</span>
              <span class="issue-title">${issue.title || "Untitled"}</span>
              <span class="count-badge badge-${sev}">${sev.toUpperCase()}</span>
            </div>
            <div class="issue-meta">${line} · ${issue.category || ""} · ${issue.source || "llm"}</div>
            <div class="issue-explanation">${issue.explanation || ""}</div>
            ${issue.suggestion ? `<div class="issue-fix">↳ ${issue.suggestion}</div>` : ""}
          </div>
        `;
      });

      document.getElementById("report").innerHTML = html;
    }

    async function reviewCode() {
      const code = document.getElementById("codeInput").value.trim();
      const filename = document.getElementById("filename").value || "snippet.py";
      if (!code) { showError("Please paste some code first."); return; }

      clearUI();
      showLoading(true);
      try {
        const res = await fetch(`${API}/review/code`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code, filename })
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        renderReport(data);
      } catch (e) {
        showError(e.message);
      } finally {
        showLoading(false);
      }
    }

    async function reviewPR() {
      const pr_url = document.getElementById("prUrl").value.trim();
      if (!pr_url) { showError("Please enter a GitHub PR URL."); return; }

      clearUI();
      showLoading(true);
      try {
        const res = await fetch(`${API}/review/pr`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pr_url })
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        renderReport(data);
      } catch (e) {
        showError(e.message);
      } finally {
        showLoading(false);
      }
    }
  </script>
</body>
</html>
